<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBD Bule! 🏆 BOOYAH 20!</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Black+Ops+One&display=swap');

        body { margin: 0; background: #05080f; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; font-family: 'Black Ops One', system-ui; color: white; }
        
        .star { position: absolute; background: #ff4500; border-radius: 50%; z-index: 1; animation: glow var(--duration) infinite; box-shadow: 0 0 5px #ff4500; }
        @keyframes glow { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 0.8; transform: scale(1.5); } }

        .main-container { display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; position: relative; width: 100%; }
        
        #gameAssets { display: flex; flex-direction: column; align-items: center; cursor: pointer; text-align: center; }

        /* MEMBUAT KELLY DARI KODE (PASTI MUNCUL) */
        .kelly-made {
            width: 80px;
            height: 100px;
            background: #ffcc00; /* Warna baju kuning Kelly */
            position: relative;
            border-radius: 10px 10px 0 0;
            margin-bottom: -5px;
            animation: bounce 1.5s infinite alternate ease-in-out;
            box-shadow: 0 0 20px #ffcc00;
        }
        /* Rambut Kelly */
        .kelly-made::before {
            content: "";
            position: absolute;
            top: -20px;
            left: 5px;
            width: 70px;
            height: 40px;
            background: #4b2c20;
            border-radius: 20px 20px 0 0;
        }
        /* Bando Kelly */
        .kelly-made::after {
            content: "";
            position: absolute;
            top: -5px;
            left: 0;
            width: 80px;
            height: 8px;
            background: white;
        }

        .airdrop { font-size: 80px; animation: drop 2s infinite ease-in-out; filter: drop-shadow(0 0 20px #ff4500); }
        
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-10px); } }
        @keyframes drop { 0%, 100% { transform: translateY(-10px); } 50% { transform: translateY(5px); } }
        
        .hint { font-size: 16px; color: #ffcc00; letter-spacing: 2px; animation: blink 1.5s infinite; text-shadow: 2px 2px 0 #000; margin-top: 20px; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }

        #message { display: none; background: rgba(0, 0, 0, 0.95); border: 3px solid #ffcc00; padding: 30px; width: 280px; box-shadow: 0 0 40px rgba(255, 69, 0, 0.7); text-align: center; }
        .booyah-title { color: #ffcc00; font-size: 32px; margin: 0 0 15px 0; font-style: italic; text-shadow: 3px 3px 0 #ff4500; }
        .btn-wa { display: inline-block; background: linear-gradient(to bottom, #ffcc00, #ff8800); color: black; text-decoration: none; padding: 12px 30px; border-radius: 5px; margin-top: 25px; font-weight: bold; border: 2px solid #fff; font-size: 11px; }
    </style>
</head>
<body>
    <div id="starContainer"></div>

    <div class="main-container">
        <div id="gameAssets" onclick="openMessage()">
            <div class="kelly-made"></div>
            <div class="airdrop">📦</div>
            <div class="hint">-- TAP TO LOOT --</div>
        </div>
        
        <div id="message">
            <h2 class="booyah-title">BOOYAH!</h2>
            <p style="font-size: 18
