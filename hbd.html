<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBD Bule! 🏆 BOOYAH!</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Black+Ops+One&display=swap');

        body { 
            margin: 0; 
            background: #0a0a0a; 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            overflow: hidden; 
            font-family: 'Black Ops One', cursive;
        }

        /* Container utama supaya semua di tengah */
        .main-wrapper {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }

        /* Area AirDrop yang bisa diklik */
        .airdrop-box {
            cursor: pointer;
            position: relative;
            transition: transform 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .airdrop-box:active { transform: scale(0.9); }

        /* Icon AirDrop Besar */
        .airdrop-icon {
            font-size: 100px;
            filter: drop-shadow(0 0 30px #ff4500);
            animation: float 2s infinite ease-in-out;
            margin-bottom: 20px;
        }

        @keyframes float {
            0%, 100% { transform: translateY(-10px); }
            50% { transform: translateY(10px); }
        }

        .hint-text {
            color: #ffcc00;
            letter-spacing: 5px;
            font-size: 18px;
            text-shadow: 2px 2px 5px #000;
            animation: blink 1.2s infinite;
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* Popup Pesan */
        #messageBox {
            display: none;
            background: rgba(0, 0, 0, 0.95);
            border: 4px solid #ffcc00;
            padding: 40px 20px;
            text-align: center;
            width: 300px;
            box-shadow: 0 0 50px rgba(255, 69, 0, 0.8);
        }

        .title { color: #ffcc00; font-size: 35px; margin: 0 0 20px 0; font-style: italic; }
        .text { color: white; font-size: 18px; line-height: 1.5; margin-bottom: 25px; }
        .btn { 
            display: inline-block; 
            background: #ffcc00; 
            color: black; 
            padding: 15px 30px; 
            text-decoration: none; 
            font-weight: bold; 
            border: 2px solid white;
        }

        /* Bara Api Latar Belakang */
        .fire { position: absolute; background: #ff4500; border-radius: 50%; opacity: 0.5; }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div id="lootArea" class="airdrop-box" onclick="showBooyah()">
            <div class="airdrop-icon">📦</div>
            <div class="hint-text">TAP TO LOOT</div>
        </div>

        <div id="messageBox">
            <h1 class="title">BOOYAH!</h1>
            <p class="text">HBD BUL. WISH U ALL THE BEST!<br><br><b>SELAMAT KEPALA DUA! ✨</b></p>
            <a href="https://wa.me/6281389295689?text=BOOYAH!%20Makasih%20ucapannya%20Firyal" class="btn">KIRIM BALASAN 💬</a>
        </div>
    </div>

    <script>
        // Munculkan Bara Api
        for (let i = 0; i < 50; i++) {
            let fire = document.createElement('div');
            fire.className = 'fire';
            let size = Math.random() * 5 + 2;
            fire.style.width = size + 'px';
            fire.style.height = size + 'px';
            fire.style.left = Math.random() * 100 + 'vw';
            fire.style.top = Math.random() * 100 + 'vh';
            document.body.appendChild(fire);
        }

        function showBooyah() {
            document.getElementById('lootArea').style.display = 'none';
            document.getElementById('messageBox').style.display = 'block';
        }
    </script>
</body>
</html>
