<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBD Bule! 🎮 Level Up!</title>
    <style>
        /* Font Pixel ala Game Retro */
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body { margin: 0; background: #05080f; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; font-family: 'Press Start 2P', cursive; color: white; text-transform: uppercase; }
        
        /* Bintang berkedip seperti pixel */
        .star { position: absolute; background: white; z-index: 1; animation: twinkle var(--duration) infinite; }
        @keyframes twinkle { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

        /* Bulan Sabit Pixel (dibuat pakai CSS shadow) */
        .moon { position: absolute; top: 40px; right: 40px; width: 40px; height: 40px; background: transparent; border-radius: 50%; box-shadow: 10px 10px 0 0 #f1c40f; filter: drop-shadow(0 0 10px #f1c40f); z-index: 2; }

        .container { text-align: center; z-index: 10; position: relative; padding: 20px; }
        
        /* Ikon Gamepad yang bisa diklik */
        .game-icon { font-size: 70px; cursor: pointer; animation: bounce 1s infinite alternate; display: inline-block; filter: drop-shadow(0 0 15px rgba(0,255,255,0.5)); margin-bottom: 20px; }
        @keyframes bounce { from { transform: translateY(0) scale(1); } to { transform: translateY(-15px) scale(1.1); } }
        
        /* Tulisan petunjuk ala game */
        .hint { font-size: 10px; color: #00ffff; letter-spacing: 1px; animation: blink 0.8s infinite; text-shadow: 0 0 5px #00ffff; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* Kotak Pesan ala Dialog Game */
        #message { display: none; background: rgba(0, 0, 0, 0.85); border: 4px solid #fff; padding: 30px; border-radius: 0; width: 300px; box-shadow: 10px 10px 0 #000, 0 0 20px rgba(0,255,255,0.3); position: relative; }
        
        /* Efek Teks Mengetik */
        #typing-text { font-size: 12px; line-height: 1.8; color: #fff; text-shadow: 2px 2px 0 #000; margin-bottom: 20px; white-space: pre-wrap; }

        /* Tombol Balas ala Game Button */
        .btn-wa { display: inline-block; background: #25d366; color: white; text-decoration: none; padding: 10px 20px; border: 4px solid #fff; font-size: 10px; font-weight: bold; box-shadow: 5px 5px 0 #000; transition: 0.2s; cursor: pointer; }
        .btn-wa:active { transform: translate(3px, 3px); box-shadow: 2px 2px 0 #000; }
        
        /* Hiasan Pixel Corner */
        .corner { position: absolute; width: 10px; height: 10px; background: #fff; }
        .top-left { top: -4px; left: -4px; }
        .top-right { top: -4px; right: -4px; }
        .bottom-left { bottom: -4px; left: -4px; }
        .bottom-right { bottom: -4px; right: -4px; }
    </style>
</head>
<body>
    <div class="moon"></div>
    <div id="starContainer"></div>

    <div class="container">
        <div id="interactiveArea">
            <div class="game-icon" onclick="openMessage()">🎮</div>
            <div class="hint">-- PRESS START --</div>
        </div>
        
        <div id="message">
            <div class="corner top-left"></div>
            <div class="corner top-right"></div>
            <div class="corner bottom-left"></div>
            <div class="corner bottom-right"></div>

            <h2 style="margin: 0 0 15px 0; color: #f1c40f; font-size: 16px; text-shadow: 2px 2px 0 #000;">LEVEL UP!</h2>
            
            <p id="typing-text"></p>
            
            <a href="https://wa.me/6281389295689?text=GGWP%20Bule!%20Makasih%20ucapannya" class="btn-wa">Kirim Makasih 💬</a>
        </div>
    </div>

    <script>
        // Membuat bintang pixel
        const container = document.getElementById('starContainer');
        for (let i = 0; i < 80; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            // Ukuran pixel (kotak)
            const size = (Math.random() * 3 + 2) + 'px'; 
            star.style.width = size;
            star.style.height = size;
            star.style.setProperty('--duration', (Math.random() * 2 + 1) + 's');
            container.appendChild(star);
        }

        // Efek Mengetik
        const textToType = "hbd bul. wish u all the best! ✨\n\n- GGWP -";
        const typingElement = document.getElementById('typing-text');
        let index = 0;

        function typeWriter() {
            if (index < textToType.length) {
                typingElement.innerHTML += textToType.charAt(index);
                index++;
                setTimeout(typeWriter, 100); // Kecepatan mengetik
            }
        }

        function openMessage() {
            document.getElementById('message').style.display = 'block';
            document.getElementById('interactiveArea').style.display = 'none';
            typeWriter(); // Mulai efek mengetik
        }
    </script>
</body>
</html>
