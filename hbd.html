<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBD Bule! 🏆 BOOYAH 20!</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Black+Ops+One&display=swap');

        body { margin: 0; background: #05080f; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; font-family: 'Black Ops One', sans-serif; color: white; }
        
        /* Efek Langit Bara Api */
        .star { position: absolute; background: #ff4500; border-radius: 50%; z-index: 1; animation: glow var(--duration) infinite; box-shadow: 0 0 5px #ff4500; }
        @keyframes glow { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 0.8; transform: scale(1.5); } }

        .container { text-align: center; z-index: 10; position: relative; }
        
        /* Area Game Assets */
        .game-assets { cursor: pointer; display: flex; flex-direction: column; align-items: center; }

        /* Karakter Kelly (Pakai Ikon Stabil) */
        .char-label { font-size: 50px; margin-bottom: 5px; filter: drop-shadow(0 0 10px #ffcc00); animation: bounce 1.5s infinite alternate; }
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-10px); } }

        /* Ikon AirDrop */
        .airdrop { font-size: 70px; filter: drop-shadow(0 0 20px #ff4500); }
        
        .hint { margin-top: 15px; font-size: 14px; color: #ffcc00; letter-spacing: 2px; animation: blink 1.5s infinite; text-shadow: 2px 2px 0 #000; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }

        /* Pesan Booyah */
        #message { display: none; background: rgba(0, 0, 0, 0.95); border: 3px solid #ffcc00; padding: 30px; border-radius: 0; width: 280px; box-shadow: 0 0 30px rgba(255, 69, 0, 0.6); }
        .booyah-title { color: #ffcc00; font-size: 32px; margin: 0 0 15px 0; font-style: italic; text-shadow: 3px 3px 0 #ff4500; }
        .btn-wa { display: inline-block; background: linear-gradient(to bottom, #ffcc00, #ff8800); color: black; text-decoration: none; padding: 12px 30px; border-radius: 5px; margin-top: 25px; font-weight: bold; border: 2px solid #fff; font-size: 11px; }
    </style>
</head>
<body>
    <div id="starContainer"></div>

    <div class="container">
        <div id="interactiveArea" onclick="openMessage()">
            <div class="game-assets">
                <div class="char-label">🏃‍♀️</div> 
                <div class="airdrop">📦</div>
            </div>
            <div class="hint">-- TAP TO LOOT --</div>
        </div>
        
        <div id="message">
            <h2 class="booyah-title">BOOYAH!</h2>
            <p style="font-size: 18px; margin: 0; color: #fff; line-height: 1.4;">HBD BUL. WISH U ALL THE BEST!</p>
            <p style="font-size: 20px; margin-top: 15px; color: #ffcc00; text-shadow: 1px 1px 5px rgba(255,255,255,0.3);">SELAMAT KEPALA DUA! ✨</p>
            <a href="https://wa.me/6281389295689?text=BOOYAH!%20Makasih%20ucapannya%20Firyal" class="btn-wa">KIRIM BALASAN 💬</a>
        </div>
    </div>

    <script>
        const container = document.getElementById('starContainer');
        for (let i = 0; i < 100; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            const size = (Math.random() * 3 + 2) + 'px'; 
            star.style.width = size;
            star.style.height = size;
            star.style.setProperty('--duration', (Math.random() * 3 + 1) + 's');
            container.appendChild(star);
        }

        function openMessage() {
            document.getElementById('message').style.display = 'block';
            document.getElementById('interactiveArea').style.display = 'none';
        }
    </script>
</body>
</html>
