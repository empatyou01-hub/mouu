<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Incoming Signal... 📡</title>
<style>
@import url('');
body { margin: 0; background: #05080f; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; font-family: 'Courier Prime', monospace; color: #00ff00; }
.fire-bg { position: absolute; width: 100%; height: 100%; z-index: 1; }
.ember { position: absolute; background: #ff4500; border-radius: 50%; opacity: 0.6; animation: fly var(--d) infinite linear; }
@keyframes fly { 0% { transform: translateY(105vh); opacity: 1; } 100% { transform: translateY(-10vh); opacity: 0; } }
.container { text-align: center; z-index: 10; width: 90%; max-width: 400px; }
#signalArea { display: block; }
.radar-icon { font-size: 50px; margin-bottom: 20px; animation: pulse 1.5s infinite; }
@keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); opacity: 0.7; } }
.typing { font-size: 18px; margin-bottom: 30px; letter-spacing: 2px; }
.decode-btn { background: transparent; color: #00ff00; border: 2px solid #00ff00; padding: 15px 30px; font-family: 'Black Ops One', cursive; font-size: 16px; cursor: pointer; box-shadow: 0 0 15px rgba(0, 255, 0, 0.3); transition: 0.3s; }
.decode-btn:hover { background: #00ff00; color: #000; }
#messageArea { display: none; background: rgba(0, 0, 0, 0.95); border: 3px solid #ffcc00; padding: 30px; box-shadow: 0 0 40px rgba(255, 69, 0, 0.6); }
.booyah-text { font-family: 'Black Ops One', cursive; color: #ffcc00; font-size: 32px; text-shadow: 2px 2px #ff4500; margin-bottom: 15px; }
.main-msg { color: #fff; font-size: 22px; line-height: 1.4; margin-bottom: 25px; font-weight: bold; }
.btn-wa { display: inline-block; background: #ffcc00; color: #000; text-decoration: none; padding: 12px 25px; font-weight: bold; font-family: 'Black Ops One', cursive; border: 2px solid #fff; }
</style>
</head>
<body>
<div class="fire-bg" id="bg"></div>
<div class="container">
<div id="signalArea">
<div class="radar-icon">📡</div>
<div class="typing">Signal Received...</div>
<p style="color: #888; font-size: 11px; margin-bottom: 25px;">> ENCRYPTED MESSAGE DETECTED</p>
<button class="decode-btn" onclick="decode()">DECODE MESSAGE</button>
</div>
<div id="messageArea">
<h1 class="booyah-text">BOOYAH!</h1>
<div class="main-msg">slmat pala dua bull!!! 🥳🔥</div>
<a href="" class="btn-wa">KIRIM BALASAN 💬</a>
</div>
</div>
<script>
const bg = document.getElementById('bg');
for (let i = 0; i < 30; i++) {
let e = document.createElement('div'); e.className = 'ember';
let s = Math.random() * 3 + 2; e.style.width = s + 'px'; e.style.height = s + 'px';
e.style.left = Math.random() * 100 + 'vw'; e.style.setProperty('--d', (Math.random() * 4 + 3) + 's');
bg.appendChild(e);
}
function decode() { document.getElementById('signalArea').style.display = 'none'; document.getElementById('messageArea').style.display = 'block'; }
</script>
</body>
</html>
