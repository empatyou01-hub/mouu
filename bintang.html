    <style>
        body { margin: 0; background: #060b14; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; font-family: sans-serif; color: white; }
        
        /* Bintang-bintang harus punya z-index agar tidak tertutup */
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.8; z-index: 1; animation: twinkle var(--duration) infinite; }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 1; transform: scale(1.5); } }

        /* Bulan Sabit */
        .moon { position: absolute; top: 40px; right: 40px; width: 60px; height: 60px; background: transparent; border-radius: 50%; box-shadow: 12px 12px 0 0 #f1c40f; filter: drop-shadow(0 0 10px #f1c40f); z-index: 2; }

        .container { text-align: center; z-index: 10; position: relative; }
        .tent { font-size: 80px; cursor: pointer; animation: bounce 2s infinite; display: block; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        
        .hint { margin-top: 15px; font-size: 14px; color: #f1c40f; letter-spacing: 1px; animation: blink 1.5s infinite; font-weight: bold; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }

        #message { display: none; margin-top: 20px; background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); padding: 25px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.2); }
        .btn-wa { display: inline-block; background: #25d366; color: white; text-decoration: none; padding: 10px 25px; border-radius: 50px; margin-top: 15px; font-weight: bold; }
    </style>
</head>
