<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Night Sky</title>
    <style>
        body { margin: 0; background: #090A0F; height: 100vh; display: flex; justify-content: center; align-items: center; font-family: sans-serif; color: white; overflow: hidden; }
        .stars { position: absolute; width: 100%; height: 100%; }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.5; }
        .container { text-align: center; z-index: 10; }
        .tent { font-size: 80px; cursor: pointer; display: block; margin-bottom: 10px; }
        .hint { font-size: 14px; color: #888; animation: blink 1s infinite; }
        @keyframes blink { 0% {opacity: 1;} 50% {opacity: 0.3;} 100% {opacity: 1;} }
        #msg { display: none; background: rgba(255,255,255,0.1); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.2); }
        .btn { display: inline-block; background: #25d366; color: white; text-decoration: none; padding: 10px 20px; border-radius: 20px; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div id="setup">
            <div class="tent" onclick="show()">⛺</div>
            <div class="hint">-- klik tendanya --</div>
        </div>
        <div id="msg">
            <p>Semangat buat hari ini! ✨</p>
            <a href="https://wa.me/6281389295689?text=Makasih%20ya!" class="btn">Balas 💬</a>
        </div>
    </div>
    <script>
        function show() {
            document.getElementById('setup').style.display = 'none';
            document.getElementById('msg').style.display = 'block';
        }
    </script>
</body>
</html>
